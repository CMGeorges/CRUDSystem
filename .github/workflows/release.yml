name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  package:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v3

      - name: Restore packages
        run: nuget restore CRUDSystem.sln

      - name: Build release
        run: msbuild CRUDSystem\CRUDSystem.csproj /p:Configuration=Release /p:Platform="Any CPU"

      - name: Archive release output
        run: Compress-Archive -Path CRUDSystem\bin\Release\* -DestinationPath CRUDSystem-Release.zip

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: crudsystem-release
          path: CRUDSystem-Release.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: CRUDSystem-Release.zip
