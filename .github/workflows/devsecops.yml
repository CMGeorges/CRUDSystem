name: DevSecOps

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  schedule:
    - cron: '0 6 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - csharp

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore packages
        run: nuget restore CRUDSystem.sln

      - name: Restore test project packages
        run: dotnet restore tests/CRUDSystem.Tests/CRUDSystem.Tests.csproj

      - name: Build
        run: msbuild CRUDSystem.sln /p:Configuration=Release /p:Platform="Any CPU"

      - name: Analyze
        uses: github/codeql-action/analyze@v4

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Dependency review
        uses: actions/dependency-review-action@v4

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Gitleaks via Docker
        run: >
          docker run --rm
          -v "${{ github.workspace }}:/repo"
          zricethezav/gitleaks:latest
          detect --source="/repo" --report-format sarif --report-path /repo/gitleaks.sarif

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks.sarif
